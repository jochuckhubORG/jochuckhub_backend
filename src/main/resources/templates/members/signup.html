<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>회원가입</h1>

    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

    <form th:action="@{/members/signup}" th:object="${signUpRequest}" method="post">

        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" th:field="*{username}" required>
            <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}" required>
            <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" th:field="*{name}" placeholder="예: 장지담" required>
            <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>

        <div class="form-group">
            <label>역할</label>
            <div class="radio-group">
                <label th:each="r : ${roles}">
                    <input type="radio" th:field="*{role}" th:value="${r}" th:text="${r}">
                </label>
            </div>
            <span class="field-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></span>
        </div>

        <div class="form-group">
            <label for="mainPosition">주 포지션</label>
            <select id="mainPosition" th:field="*{mainPosition}" required>
                <option value="">-- 선택 --</option>
                <option th:each="p : ${positions}" th:value="${p}" th:text="${p}"></option>
            </select>
            <span class="field-error" th:if="${#fields.hasErrors('mainPosition')}" th:errors="*{mainPosition}"></span>
        </div>

        <div class="form-group">
            <label>서브 포지션 <small>(최대 3개, 주 포지션과 중복 불가)</small></label>
            <div class="checkbox-grid" id="subPositionGroup">
                <label th:each="p : ${positions}" class="checkbox-label">
                    <input type="checkbox" th:field="*{subPositions}" th:value="${p}" th:text="${p}">
                </label>
            </div>
            <span class="field-error" th:if="${#fields.hasErrors('subPositions')}" th:errors="*{subPositions}"></span>
        </div>

        <button type="submit" class="btn">가입하기</button>
    </form>

    <p class="signup-link">이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a></p>
</div>

<script>
    const MAX_SUB = 3;
    const checkboxes = document.querySelectorAll('#subPositionGroup input[type=checkbox]');

    checkboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            const checked = [...checkboxes].filter(c => c.checked);
            if (checked.length > MAX_SUB) {
                cb.checked = false;
            }
        });
    });
</script>
</body>
</html>
