spring.application.name=jochuckhub

# 비밀 키는 application-private.properties에서 관리 (git 제외)
spring.config.import=application-private.properties

# database
spring.datasource.url=jdbc:mysql://localhost:3306/jochuckhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
# spring.datasource.password → application-private.properties

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.expiration=86400000
# jwt.secret → application-private.properties

# Kakao OAuth2
# kakao.client-id, kakao.client-secret → application-private.properties
