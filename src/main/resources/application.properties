spring.application.name=jochuckhub

# Secrets are managed in application-private.properties (git-excluded)
spring.config.import=application-private.properties

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/jochuckhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
# spring.datasource.password -> application-private.properties

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.expiration=86400000
# jwt.secret -> application-private.properties

# Kakao OAuth2
# kakao.client-id, kakao.client-secret -> application-private.properties
kakao.redirect-uri=http://localhost:8080/api/auth/kakao/callback
# local test: http://localhost:8080/test-login.html / frontend dev: http://localhost:3000
kakao.frontend-redirect-uri=http://localhost:3000

# CORS
cors.allowed-origins=http://localhost:3000
